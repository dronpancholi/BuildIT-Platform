# ============================================================================
# SEO Operations Platform — Docker Compose (Core Infrastructure)
# ============================================================================
# Production-mirror infrastructure for local development.
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
# ============================================================================

services:
  # --------------------------------------------------------------------------
  # PostgreSQL 16 (Primary Database)
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: seo-postgres
    environment:
      POSTGRES_DB: seo_platform
      POSTGRES_USER: seo_platform
      POSTGRES_PASSWORD: seo_platform_dev
      # Enable pgcrypto for gen_random_uuid()
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts/postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seo_platform"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Redis 7 (Cache + Rate Limiting + Kill Switches)
  # --------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: seo-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Apache Kafka + Zookeeper (Event Bus)
  # --------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: seo-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: seo-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168  # 7 days
      KAFKA_MESSAGE_MAX_BYTES: 1048576
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Temporal.io (Workflow Orchestration)
  # --------------------------------------------------------------------------
  temporal:
    image: temporalio/auto-setup:1.24
    container_name: seo-temporal
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=seo_platform
      - POSTGRES_PWD=seo_platform_dev
      - POSTGRES_SEEDS=postgres
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development.yaml
    ports:
      - "7233:7233"
    volumes:
      - ./temporal-config:/etc/temporal/config/dynamicconfig
    restart: unless-stopped

  temporal-ui:
    image: temporalio/ui:2.26.2
    container_name: seo-temporal-ui
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    ports:
      - "8233:8080"
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Qdrant (Vector Database)
  # --------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.9.7
    container_name: seo-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # MailHog (Email Capture — No Real Emails Sent)
  # --------------------------------------------------------------------------
  mailhog:
    image: mailhog/mailhog:latest
    container_name: seo-mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # MinIO (S3-Compatible Storage)
  # --------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: seo-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  zookeeper_data:
  kafka_data:
  qdrant_data:
  minio_data:
