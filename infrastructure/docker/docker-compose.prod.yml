# ============================================================================
# BuildIT Platform — Production Deployment
# ============================================================================
# Full-stack deployment with all infrastructure + app services.
#
# Usage:
#   export DOMAIN=yourdomain.com
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml logs -f
# ============================================================================

services:
  # ==========================================================================
  # App Services
  # ==========================================================================

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: seo-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=seo_platform
      - POSTGRES_USER=seo_platform
      - POSTGRES_PASSWORD=seo_platform_dev
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - TEMPORAL_HOST=temporal
      - TEMPORAL_PORT=7233
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - CORS_ORIGINS=http://localhost,http://localhost:3000,https://${DOMAIN:-localhost}
      # Start with single worker for SSE/in-memory state safety
      - UVICORN_WORKERS=1
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    container_name: seo-frontend
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://${DOMAIN:-localhost}/api/v1
      - NEXT_TELEMETRY_DISABLED=1
    ports:
      - "3000:3000"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: seo-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
