# ============================================================================
# BuildIT Platform — Nginx Configuration (Cloudflare Tunnel Edition)
# ============================================================================
# Single ingress for everything. Cloudflare Tunnel points at this nginx,
# and this routes by path to every service in the docker stack.
#
#   /                 → Frontend (Next.js, port 3000)
#   /api/, /docs, ... → Backend (FastAPI, port 8000)
#   /minio/           → MinIO Console (port 9001)
#   /mailhog/         → MailHog UI (port 8025)
#   /qdrant/          → Qdrant Dashboard (port 6333)
#   /temporal/        → Temporal UI (port 8233)
#   /grafana/         → Grafana (port 3001)
#   /prometheus/      → Prometheus (port 9090)
#   /healthz          → 200 (tunnel health)
# ============================================================================

upstream backend      { server backend:8000; }
upstream frontend     { server frontend:3000; }
upstream minio        { server minio:9001; }
upstream mailhog      { server mailhog:8025; }
upstream qdrant       { server qdrant:6333; }
upstream temporal_ui  { server seo-temporal-ui:8080; }
upstream grafana      { server seo-grafana:3000; }
upstream prometheus   { server seo-prometheus:9090; }

# Map used to strip the path-prefix before forwarding to upstream
map $request_uri $minio_root { default $uri; }

server {
    listen 80;
    server_name _;

    client_max_body_size 50M;

    # Allow long-lived SSE / streams
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    # Common proxy headers
    proxy_http_version 1.1;
    proxy_set_header Host               $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;
    proxy_set_header X-Forwarded-Host   $host;
    proxy_set_header X-Forwarded-Prefix "";

    # ---------- Health ----------
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "healthy\n";
    }

    # ---------- Backend (FastAPI) ----------
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Connection '';
        chunked_transfer_encoding on;
    }
    location = /docs { proxy_pass http://backend/docs; }
    location = /openapi.json { proxy_pass http://backend/openapi.json; }
    location = /redoc { proxy_pass http://backend/redoc; }

    # ---------- Frontend (Next.js) ----------
    location / {
        proxy_pass http://frontend;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ---------- MinIO Console ----------
    # The minio console is an SPA at / which issues absolute asset paths.
    # We rewrite the location header so any 302 still points back through /minio/.
    location ^~ /minio/ {
        proxy_pass http://minio/;
        proxy_redirect /  /minio/;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ---------- MailHog ----------
    location ^~ /mailhog/ {
        proxy_pass http://mailhog/;
        proxy_redirect / /mailhog/;
    }

    # ---------- Qdrant Dashboard ----------
    # Qdrant serves the dashboard at /dashboard, but uses absolute asset paths.
    # Strip the prefix and tell the upstream the original prefix via header.
    location ^~ /qdrant/ {
        rewrite ^/qdrant/(.*)$ /dashboard/$1 break;
        proxy_pass http://qdrant;
        proxy_redirect / /qdrant/;
    }
    location = /qdrant { return 302 /qdrant/; }

    # ---------- Temporal UI ----------
    location ^~ /temporal/ {
        proxy_pass http://temporal_ui/;
        proxy_redirect / /temporal/;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
    location = /temporal { return 302 /temporal/; }

    # ---------- Grafana ----------
    location ^~ /grafana/ {
        proxy_pass http://grafana/;
        proxy_redirect / /grafana/;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Referer    $http_referer;
    }
    location = /grafana { return 302 /grafana/; }

    # ---------- Prometheus ----------
    location ^~ /prometheus/ {
        proxy_pass http://prometheus/;
        proxy_redirect / /prometheus/;
    }
    location = /prometheus { return 302 /prometheus/; }
}
