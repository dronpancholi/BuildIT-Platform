# Prometheus Configuration — Development
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "seo-platform-api"
    static_configs:
      - targets: ["host.docker.internal:8000"]
    metrics_path: "/metrics"
    scrape_interval: 10s

  - job_name: "temporal"
    static_configs:
      - targets: ["temporal:9090"]
    scrape_interval: 30s

  - job_name: "redis"
    static_configs:
      - targets: ["redis:6379"]
    scrape_interval: 30s
