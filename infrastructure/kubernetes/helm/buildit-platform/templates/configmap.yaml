apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "buildit-platform.fullname" . }}
  labels:
    {{- include "buildit-platform.labels" . | nindent 4 }}
data:
  APP_NAME: {{ .Values.env.common.APP_NAME | quote }}
  APP_ENV: {{ .Values.env.prod.APP_ENV | quote }}
  APP_LOG_LEVEL: {{ .Values.env.common.APP_LOG_LEVEL | quote }}
  APP_DEBUG: {{ .Values.env.common.APP_DEBUG | quote }}
  PYTHONUNBUFFERED: {{ .Values.env.common.PYTHONUNBUFFERED | quote }}
  PYTHONDONTWRITEBYTECODE: {{ .Values.env.common.PYTHONDONTWRITEBYTECODE | quote }}
  PYTHONPATH: {{ .Values.env.common.PYTHONPATH | quote }}

  POSTGRES_HOST: {{ .Values.database.host | quote }}
  POSTGRES_PORT: {{ .Values.database.port | quote }}
  POSTGRES_DB: {{ .Values.database.name | quote }}

  REDIS_HOST: {{ .Values.redis.host | quote }}
  REDIS_PORT: {{ .Values.redis.port | quote }}
  REDIS_DB: {{ .Values.redis.db | quote }}

  KAFKA_BOOTSTRAP_SERVERS: {{ .Values.kafka.bootstrapServers | quote }}

  TEMPORAL_HOST: {{ .Values.temporal.host | quote }}
  TEMPORAL_PORT: {{ .Values.temporal.port | quote }}
  TEMPORAL_NAMESPACE: {{ .Values.temporal.namespace | quote }}

  CORS_ORIGINS: "https://{{ (index .Values.ingress.hosts 0).host }}"

  OTEL_SERVICE_NAME: {{ .Values.env.common.APP_NAME | quote }}
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
